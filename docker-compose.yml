services:
  api:
    image: ghcr.io/labnerd-net/tv-tracker-api:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_FILE_NAME: file:/app/data/local.db
      SERVER_PORT: 3000
      CLIENT_URL: http://localhost:80        # set to your UI's public URL
      JWT_SECRET: change-me                  # openssl rand -base64 32
      BCRYPT_SALT_ROUNDS: 10
    volumes:
      - tv-tracker-data:/app/data

  ui:
    image: ghcr.io/labnerd-net/tv-tracker-ui:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_HOST: api                          # Docker service name of the API container
    depends_on:
      - api

volumes:
  tv-tracker-data:
