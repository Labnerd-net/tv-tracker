server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the API container.
    # API_HOST is substituted at container startup via envsubst.
    # Set API_HOST to the internal hostname of the API service:
    #   docker-compose:  API_HOST=api
    #   Dokploy:         API_HOST=tv-tracker-backend-cg5xbi
    location /api/ {
        proxy_pass http://${API_HOST}:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
